<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa — IA y Trabajo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap');
  :root {
    --bg: #F4EFE4; --panel: #FDFCF9; --panel-2: #EDE8DC; --line: #C8C0B0;
    --text: #18160F; --text-dim: #5A5448; --text-faint: #9C9488;
    --accent: #1a1aff; --accent-2: #0000CC; --hl: #FF3300;
    --t-acad: #1a1aff; --t-publ: #0000CC; --t-oper: #B84400; --t-cura: #007A3A;
    --t-acti: #CC0022; --t-func: #8A6600; --t-inst: #6B6058; --t-empr: #CC0022;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
  }
}
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 14px; line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { border-bottom: 2px solid var(--accent); padding: 14px 22px;
    display: flex; align-items: center; gap: 22px; flex-wrap: wrap; background: var(--panel); }
  header h1 { font-size: 15px; font-weight: 500; margin: 0; font-family: var(--mono); letter-spacing: 0.04em; }
  header h1 small { color: var(--accent); font-weight: 400; margin-left: 6px; font-family: var(--mono); }
  #search { flex: 1; min-width: 220px; max-width: 460px; background: var(--panel-2);
    color: var(--text); border: 1px solid var(--line); border-radius: 0;
    padding: 7px 12px; font-size: 13px; outline: none; font-family: var(--mono); letter-spacing: 0.02em; }
  #search:focus { border-color: var(--accent); }
  nav.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line);
    background: var(--panel); padding: 0 22px; }
  nav.tabs button { background: transparent; border: none; color: var(--text-dim);
    padding: 11px 16px; cursor: pointer; font-size: 11px; font-family: var(--mono);
    text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 2px solid transparent; }
  nav.tabs button:hover { color: var(--text); }
  nav.tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
  main { display: grid; grid-template-columns: 1fr 360px; height: calc(100vh - 110px); }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; height: auto; }
    #detail { border-left: none; border-top: 1px solid var(--line); } }
  #stage { overflow: auto; position: relative; }
  #detail { border-left: 1px solid var(--line); background: var(--panel);
    overflow-y: auto; padding: 18px 22px; }
  #grafoView { position: relative; height: 100%; min-height: 600px; overflow: hidden; }
  #grafoCanvas { display: block; cursor: grab; width: 100%; height: 100%;
    background: var(--bg); }
  #grafoCanvas:active { cursor: grabbing; }
  .legend { position: absolute; bottom: 14px; left: 14px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 0;
    padding: 10px 12px; font-size: 10px; color: var(--text-dim); font-family: var(--mono);
    display: grid; grid-template-columns: repeat(2, max-content); gap: 4px 14px; }
  .legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle; }
  .controls { position: absolute; top: 14px; right: 14px;
    display: flex; flex-direction: column; gap: 4px; }
  .controls button { background: var(--panel); border: 1px solid var(--line);
    color: var(--text); border-radius: 0; width: 32px; height: 32px;
    cursor: pointer; font-size: 16px; font-family: var(--mono); }
  .controls button:hover { background: var(--panel-2); }
  #autoresView, #fuentesView { padding: 18px 22px; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
    padding-bottom: 14px; border-bottom: 1px solid var(--line); }
  .filter-chip { background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text-dim); padding: 4px 10px; border-radius: 0;
    font-size: 10px; cursor: pointer; transition: all 0.15s; font-family: var(--mono); letter-spacing: 0.05em; text-transform: uppercase; }
  .filter-chip:hover { color: var(--text); }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .author-list { display: flex; flex-direction: column; gap: 1px; }
  .author-card { padding: 11px 14px; background: var(--panel); border: 1px solid var(--line);
    border-bottom: none; cursor: pointer; transition: background 0.1s; position: relative; }
  .author-card:first-child { border-radius: 0; }
  .author-card:last-child { border-bottom: 1px solid var(--line); border-radius: 0; }
  .author-card:hover { background: var(--panel-2); }
  .author-card .top { display: flex; align-items: center; gap: 10px; }
  .author-card .name { font-weight: 600; color: var(--text); }
  .author-card .tag { font-size: 9px; padding: 2px 7px; border-radius: 0;
    background: transparent; color: var(--accent); text-transform: uppercase;
    letter-spacing: 0.06em; border: 1px solid var(--accent); font-family: var(--mono); }
  .author-card .meta { color: var(--text-dim); font-size: 11px; margin-top: 3px; font-family: var(--mono); }
  #nodosView { padding: 18px 22px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .node-card { background: var(--panel); border: 1px solid var(--line);
    border-radius: 0; padding: 14px 16px; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; gap: 8px; position: relative; }
  .node-card:hover { border-color: var(--accent); border-left-width: 3px; }
  .node-card .node-num { width: 28px; height: 28px; background: transparent;
    color: var(--accent); border: 1.5px solid var(--accent); border-radius: 50%;
    display: inline-flex; align-items: center;
    justify-content: center; font-weight: 600; font-size: 12px; margin-right: 8px;
    font-family: var(--mono); flex-shrink: 0; }
  .node-card .node-title { font-weight: 600; font-size: 13px; line-height: 1.35; }
  .node-card .node-q { color: var(--text-dim); font-size: 12px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .node-card .node-count { color: var(--text-faint); font-size: 10px; margin-top: 4px; font-family: var(--mono); }
  #novedadesView { padding: 18px 22px; max-width: 780px; }
  .nov-subtabs { display:flex; gap:0; margin-bottom:20px; border-bottom:1px solid var(--line); }
  .nov-subtab { background:none; border:none; border-bottom:2px solid transparent;
    color:var(--text-dim); padding:8px 18px; cursor:pointer; font-size:10px;
    font-family:var(--mono); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:-1px; }
  .nov-subtab:hover { color:var(--text); }
  .nov-subtab.active { color:var(--text); border-bottom-color:var(--accent); font-weight:500; }
  .nov-section-header { font-size:10px; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--accent); font-weight:500; padding:6px 0 8px; font-family:var(--mono);
    border-bottom:1px solid var(--accent); margin:28px 0 14px; }
  .nov-section-header:first-child { margin-top:0; }
  .nov-nodo-row { display:flex; align-items:center; gap:8px; margin:26px 0 12px;
    padding-bottom:8px; border-bottom:1px solid var(--line); }
  .nov-nodo-row:first-child { margin-top:0; }
  .nov-nodo-num { width:26px; height:26px; background:transparent; color:var(--accent);
    border:1.5px solid var(--accent); border-radius:50%; display:inline-flex;
    align-items:center; justify-content:center;
    font-weight:600; font-size:10px; flex-shrink:0; font-family:var(--mono); }
  .nov-nodo-name { font-weight:600; font-size:13px; line-height:1.3; }
  .nov-empty { color:var(--text-faint); font-size:12px; font-style:italic; padding:4px 0 10px; }
  .alert-item { background:var(--panel); border:1px solid var(--line); border-radius:0;
    border-left:2.5px solid var(--accent); padding:14px 16px 14px 18px;
    margin-bottom:10px; position:relative; }
  .alert-item:last-child { margin-bottom:0; }
  .alert-meta { color:var(--text-faint); font-size:10px; margin-bottom:5px; font-family:var(--mono); letter-spacing:0.03em; }
  .alert-title { font-weight:600; font-size:13px; color:var(--text); margin-bottom:8px; line-height:1.35; letter-spacing:-0.01em; }
  .alert-summary { font-size:12px; color:var(--text-dim); line-height:1.7; }
  #detail .empty-state { color: var(--text-dim); font-size: 13px; padding: 60px 12px; text-align: center; }
  #detail h2 { margin: 0 0 6px 0; font-size: 17px; font-weight: 600; }
  #detail .sub { color: var(--text-dim); font-size: 12px; margin-bottom: 14px; }
  #detail .row { margin-bottom: 12px; font-size: 13px; }
  #detail .row .label { color: var(--text-faint); font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px; font-family: var(--mono); }
  #detail .row .val { color: var(--text); }
  #detail .nodes-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  #detail .node-pill { background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 0; padding: 3px 9px; font-size: 10px; cursor: pointer; color: var(--text); font-family: var(--mono); }
  #detail .node-pill:hover { border-color: var(--accent); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 0; }

  /* ── decorative corners: globitos ─────────────────────────────── */
  .alert-item::before,
  .node-card::before,
  .author-card:first-child::before {
    content: '';
    position: absolute;
    top: -4px; right: -4px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    z-index: 1;
  }
  .alert-item::after {
    content: '';
    position: absolute;
    bottom: -4px; right: -4px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--line);
  }

  /* ── section decorators ─────────────────────────────────────────── */
  .nov-nodo-row {
    position: relative;
  }
  .nov-nodo-row::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ── fuentes/autores source tag ─────────────────────────────────── */
  .author-card .name { font-size: 13px; }

  /* ── node card left accent on hover is smooth ───────────────────── */
  .node-card { transition: border-left-width 0.1s, border-color 0.1s; }

  /* ── header title accent dot ────────────────────────────────────── */
  header h1::after {
    content: '·';
    color: var(--accent);
    margin-left: 6px;
    font-weight: 700;
  }

  /* ── tab nav decoration ─────────────────────────────────────────── */
  nav.tabs { border-bottom: 1px solid var(--line); position: relative; }

  /* ── novedades view max-width ───────────────────────────────────── */
  #novedadesView { max-width: 820px; }

  /* ── week-group header ──────────────────────────────────────────── */
  .nov-week-header {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    padding: 5px 0 6px;
    border-top: 1px solid var(--line);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nov-week-header::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

</style>
</head>
<body>
<header>
  <h1>Mapa <small>· IA y Trabajo</small></h1>
  <input type="search" id="search" placeholder="Buscar por nombre, institución, foco, concepto…" autocomplete="off">
</header>
<nav class="tabs">
  <button class="active" data-view="grafo">Grafo</button>
  <button data-view="autores">Autores</button>
  <button data-view="nodos">Nodos del debate</button>
  <button data-view="fuentes">Fuentes</button>
  <button data-view="novedades">Novedades</button>
</nav>
<main>
  <section id="stage">
    <div id="grafoView" style="display:block">
      <canvas id="grafoCanvas"></canvas>
      <div class="legend" id="legend"></div>
      <div class="controls">
        <button id="zoomIn">+</button>
        <button id="zoomOut">&minus;</button>
        <button id="zoomReset">&#x2299;</button>
      </div>
    </div>
    <div id="autoresView" style="display:none">
      <div class="filters" id="filtersBar"></div>
      <div class="author-list" id="authorList"></div>
    </div>
    <div id="nodosView" style="display:none"></div>
    <div id="fuentesView" style="display:none">
      <div class="filters" id="fuentesFilters"></div>
      <div class="author-list" id="fuentesList"></div>
    </div>
    <div id="novedadesView" style="display:none">
      <!-- NOVEDADES_START -->
      <div class="nov-subtabs">
        <button class="nov-subtab active" onclick="novSwitch('semana',this)">Por semana</button>
        <button class="nov-subtab" onclick="novSwitch('nodo',this)">Por nodo</button>
      </div>
      <div id="novSemana"></div>
      <div id="novNodo" style="display:none"></div>
      <!-- NOVEDADES_END -->
    </div>
  </section>
  <aside id="detail">
    <div class="empty-state">Hacé clic en un autor del grafo o de la lista para ver sus detalles.</div>
  </aside>
</main>

), Andrés López (UBA-IIEP), Verónica Robert (UNSAM)"}, {"id": 2, "n": "Productividad y desempeño de trabajadores con IA", "q": "¿Las ganancias medidas en estudios experimentales con LLMs se trasladan a productividad agregada? ¿Quiénes capturan esos aumentos?", "t": "Estudios de lab muestran efectos heterogéneos: la IA cierra la brecha junior-senior. Esto abre preguntas sobre mentoría y aprendizaje organizacional. Paradoja de Solow recargada: ganancias firma vs. agregado.", "an": "Brynjolfsson, Rock, Noy, Zhang, Manning, Mollick, Humlum, Babina, Goldfarb, Agrawal, Levie", "as": "Lachman (UBA-CIECTI), CIPPEC (estudios sectoriales)"}, {"id": 3, "n": "Trabajo invisible / fantasma / data labor", "q": "¿Qué trabajo humano hay detrás de cada modelo de IA, dónde se hace, en qué condiciones, y cómo se reconoce o invisibiliza?", "t": "Gray/Suri y Casilli teorizaron desde el Norte; Miceli, Posada, Tarcízio Silva extienden la mirada al Sur. Phil Jones discute si el modelo es 'trabajo' clásico o algo nuevo. Karen Hao puso el caso Sama-Kenia en agenda global.", "an": "Mary Gray, Casilli, Phil Jones, Aiha Nguyen, Adrienne Williams, Sarah Roberts, Karen Hao, Tubaro, Muldoon-Cant", "as": "Milagros Miceli (DAIR), Julián Posada (Yale, colombiano), Tarcízio Silva (Brasil), Joana Varon (Brasil), Paola Ricaurte (México), Birhane (Etiopía)"}, {"id": 4, "n": "Plataformas, gig economy y derecho laboral", "q": "¿Qué estatuto laboral le corresponde a quien trabaja gestionado por algoritmo, y cómo se traduce el management algorítmico a derecho del trabajo?", "t": "Modelo californiano (Prop 22, contractor) vs. modelo europeo (Directiva UE 2024 con presunción de empleo). Caso Aslam vs. Uber (UK Supreme Court 2021) marcó precedente. ¿Acción legal o acción colectiva?", "an": "Veena Dubal, Mark Graham (Fairwork), Wood, Woodcock, Schor, van Doorn, Aloisi, De Stefano, Berg (OIT), Casilli, Cant, Sarah O'Connor", "as": "Albrieu, Galperin, Zukerfeld (Argentina), Arriagada, Gutiérrez Crocco (Chile), Ludmila Abilio (Brasil), Rafael Grohmann (Brasil-Canadá), Rani (OIT)"}, {"id": 5, "n": "Vigilancia laboral y management algorítmico (bossware)", "q": "¿Cómo se está usando IA para gestionar y monitorear trabajadores formales, no solo gig? ¿Qué resistencias jurídicas y colectivas son posibles?", "t": "Cruce con derecho de privacidad y derecho laboral. Casos: monitoreo en call centers, productividad por keystrokes, scoring de empleados. Espacio donde sindicatos y juristas están más activos.", "an": "Karen Levy, Ifeoma Ajunwa, Aiha Nguyen, Aloisi, De Stefano, Brishen Rogers, Sandra Wachter, Hertog, Pasquale", "as": "Beatriz Busaniche (Vía Libre, Argentina), Sergio Amadeu (Brasil), Rafael Zanatta (Brasil), R3D (México), Karisma (Colombia)"}, {"id": 6, "n": "Avances en capacidades de modelos / frontera técnica", "q": "¿Qué pueden hacer realmente los modelos hoy? ¿Los benchmarks miden lo que importa para el trabajo?", "t": "Optimistas (laboratorios, Mollick) vs. escépticos del hype (Marcus, Mitchell, Bender, Kapoor-Narayanan, Birhane). Brecha entre demos y deployment real.", "an": "Sam Altman, Dario Amodei, Suleyman, Hassabis, Murati, LeCun, Hinton, Hendrycks, Mollick, Marcus, Mitchell, Bender, Kapoor, Narayanan, Andrew Ng, Fei-Fei Li, Benaich, Jane Wang", "as": "Vanina Martínez (ICREA, argentina), Wagner Meira Jr. (UFMG), Birhane, Ochigame (Brasil-Holanda)"}, {"id": 7, "n": "Concentración de poder, monopolios e infraestructura de IA", "q": "¿Quién es dueño de las capacidades, los datos y la infraestructura, y qué implica para trabajadores y democracia?", "t": "Antitrust (Khan, Wu) vs. economía política crítica (Rikap, Crawford, Srnicek, Pasquale, Mattei). Debate sobre modelos abiertos vs. cerrados como vector de democratización.", "an": "Cecilia Rikap, Crawford, Whittaker, Khan, Wu, Pasquale, Srnicek, Schaake, Morozov, Wendy Liu, Stephanie Hare, Clara Mattei, Cade Metz", "as": "Sergio Amadeu (Brasil), Tarcízio Silva (Brasil), Renata Ávila (Guatemala), Becerra (Argentina), Zuazo (Argentina), Joana Varon, Ricaurte"}, {"id": 8, "n": "Negociación colectiva, huelgas y acción colectiva", "q": "¿Qué cláusulas-tipo debería incluir un convenio colectivo en la era IA? ¿Cómo se organizan trabajadores fragmentados?", "t": "Casos faro: WGA-SAG 2023, IG Metall en Alemania, Aslam vs Uber. Tensión entre estrategia jurídica (litigio individual) y estrategia colectiva (sindicalización, huelga).", "an": "Mary Towers (TUC), Christy Hoffman (UNI), Amanda Ballantyne (AFL-CIO), James Farrar, Yaseen Aslam, Veena Dubal, WGA, SAG-AFTRA, IG Metall, Janine Berg", "as": "APP (Argentina), Aliança Entregadores (Brasil), Entregadores Antifascistas (Brasil), UNI Américas, Rafael Grohmann"}, {"id": 9, "n": "Teoría / filosofía / futuro del trabajo", "q": "¿IA acelera la automatización completa o estamos en estancamiento productivo encubierto? ¿Reducción de jornada, ingreso básico, democratización productiva?", "t": "FALC (Bastani) vs. tesis de estancamiento (Benanav). Hester y feminismo del cuidado vs. canon masculino del post-trabajo. Graeber sobre 'bullshit jobs' como crítica.", "an": "Bastani, Butler, Srnicek, Hester, Muldoon, Benanav, Susskind, Frey, Pasquale, Pitts, Wendy Liu, Bridle, Phil Jones, Schor, Scholz, Mattei, DeLong", "as": "Mariano Zukerfeld (Argentina), Tomás Balmaceda (Argentina), Eden Medina (Cybersyn como precedente), Ludmila Abilio (Brasil)"}, {"id": 10, "n": "Política pública y regulación", "q": "¿La regulación actual contempla 'el trabajo' como dimensión protegida o lo subsume bajo 'consumidor' o 'ciudadano'?", "t": "EU AI Act (incluye sistemas de empleo como alto riesgo) vs. enfoque sectorial estadounidense. Diferenciales Norte-Sur en capacidad regulatoria.", "an": "Schaake, Toner, Suresh Venkatasubramanian, Alondra Nelson, Pasquale, Wachter, Margetts, Carly Kind, Pissarides, Broecke (OECD), Berg (OIT), Salomé Viljoen, Jack Clark, Brundage", "as": "Vanina Martínez (UNESCO), Renata Ávila, Ricaurte, Lemos (Brasil), Lara y Canales (Chile), Botero (Colombia), Scrollini (Uruguay), Aneja (India), Adams (Sudáfrica), CEPAL, BID"}, {"id": 11, "n": "Sur Global y desigualdades geográficas del trabajo IA", "q": "¿Quién hace el trabajo barato que sostiene la IA? ¿Dónde se concentra el valor capturado? ¿Cómo se reproducen patrones coloniales?", "t": "Lectura decolonial (Ricaurte, Birhane) vs. economía política de la dependencia tecnológica (Rikap). Debate sobre 'AI sovereignty' regional.", "an": "Birhane, Crawford, Tubaro, Mary Gray, Gebru, Mark Graham (Fairwork mide global), Karen Hao, Sarah Roberts, Rani (OIT)", "as": "Cecilia Rikap, Milagros Miceli, Paola Ricaurte, Tarcízio Silva, Joana Varon, Julián Posada, Ramiro Albrieu, Hernán Galperin, Ludmila Abilio, Rafael Grohmann, Nina da Hora, Eden Medina, Urvashi Aneja, Payal Arora, Rachel Adams"}, {"id": 12, "n": "Habilidades, formación y transiciones laborales", "q": "Si la IA cambia qué tareas son escasas, ¿qué políticas educativas y de reconversión tienen sentido?", "t": "Apuesta por skills vs. apuesta por instituciones laborales fuertes (Acemoglu en versión normativa). Riesgo de individualización: 'reconvertirse' como responsabilidad personal.", "an": "Autor, Pissarides, Susskind, Acemoglu, Goldin, Katz, Deming, Broecke (OECD), Sarah O'Connor, Stronge", "as": "Albrieu (CIPPEC), Andrés López (UBA), BID Empleo, OIT América Latina"}, {"id": 13, "n": "Estudios sectoriales / profesiones específicas", "q": "¿Cómo enfrenta cada gremio su propia historia con IA? Programadores, abogados, médicos, educadores, periodistas, artistas, atención al cliente.", "t": "Cada profesión tiene patrón distinto: complementariedad clara (programación con Copilot), conflicto abierto (guionistas), incertidumbre (educación). Riesgo de generalizaciones que aplanan diferencias sectoriales.", "an": "Mollick (educación, white collar), Casey Newton, NewsGuild, WGA, Tobi Lütke, Aaron Levie, Cade Metz, Charlie Warzel, Karen Hao, Kevin Roose", "as": "Esteban Magnani (Argentina, periodismo), Tomás Balmaceda (filosofía/divulgación), Jonathan Haidt (educación, adyacente)"}, {"id": 14, "n": "Trabajo de cuidado y reproducción social bajo IA (provisional)", "q": "¿Cómo afecta la IA al trabajo reproductivo, doméstico y de cuidado, históricamente feminizado y desvalorizado?", "t": "Nodo provisional: ¿amerita existir como nodo aparte o quedar dentro del 9? Hester argumenta que la automatización del cuidado abre preguntas distintas. Hertog estudia 'domestic AI' empíricamente.", "an": "Helen Hester, Ekaterina Hertog, Mary Gray (intersección con trabajo invisible), Kathi Weeks, Silvia Federici (referencia histórica)", "as": "Lourdes Barrera (Luchadoras, México), Nina da Hora (Brasil), Ludmila Abilio (intersección con feminización del trabajo de plataforma)"}], "fuentes": [{"n": "arXiv (cs.CY, cs.AI, econ.GN)", "c": "Base académica", "sc": "Preprints", "p": "Global", "u": "arxiv.org", "l": "EN", "f": "Papers nuevos en ciencia computacional y economía", "pr": "Alta", "no": "Filtrar por categorías relevantes"}, {"n": "SSRN", "c": "Base académica", "sc": "Working papers", "p": "Global", "u": "papers.ssrn.com", "l": "EN", "f": "Working papers en ciencias sociales", "pr": "Alta", "no": ""}, {"n": "NBER Working Papers", "c": "Base académica", "sc": "Working papers", "p": "EE.UU.", "u": "nber.org/papers", "l": "EN", "f": "Economía estadounidense, AI y trabajo", "pr": "Alta", "no": "Sale gente como Acemoglu, Autor, Johnson"}, {"n": "IDEAS/RePEc", "c": "Base académica", "sc": "Repositorio", "p": "Global", "u": "ideas.repec.org", "l": "EN", "f": "Economía", "pr": "Media", "no": ""}, {"n": "CEPR VoxEU", "c": "Base académica", "sc": "Columnas académicas", "p": "Europa", "u": "cepr.org/voxeu", "l": "EN", "f": "Columnas de economistas sobre IA, productividad", "pr": "Alta", "no": ""}, {"n": "CEDLAS (UNLP)", "c": "Base académica", "sc": "Working papers", "p": "Argentina", "u": "cedlas.econo.unlp.edu.ar", "l": "ES", "f": "Estudios distributivos LatAm", "pr": "Alta", "no": ""}, {"n": "IIEP-UBA-C function selectAuthor(a) {
  state.selected = a;
  const d = document.getElementById('detail');
  const col = typeColor(a.t);
  const nodeRefs = (a.nd || []).map(nid => {
    const node = NODES.find(n => n.id === nid);

  }).join('');
  d.innerHTML = '<h2>' + a.n + '</h2>' +
    '<div class="sub"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + col + ';margin-right:6px;vertical-align:middle;"></span>' + a.t + ' · ' + a.p + '</div>' +

    (a.c ? '<div class="row"><div class="label">Confianza</div><div class="val">' + a.c + '</div></div>' : '') +
    (a.no ? '<div class="row"><div class="label">Notas</div><div class="val">' + a.no + '</div></div>' : '') +
    (nodeRefs ? '<div class="row"><div class="label">Nodos en los que opera</div><div class="nodes-list">' + nodeRefs + '</div></div>' : '');

    pill.onclick = () => {

      if (node) showNodeDetail(node);

}
function showNodeDetail(node) {
  state.selected = null;
  const authors = AUTHORS.filter(a => a.nd && a.nd.includes(node.id));
  const byType = {};
  authors.forEach(a => {
    const k = a.t || 'Otro';
    if (!byType[k]) byType[k] = [];
    byType[k].push(a);
  });
  let groups = '';
  Object.entries(byType).forEach(([t, list]) => {
    const links = list.map(a => '<a href="#" data-aname="' + a.n.replace(/"/g, '&quot;') + '">' + a.n + '</a>').join(' &middot; ');
    groups += '<div class="row"><div class="label">' + t + ' (' + list.length + ')</div><div class="val" style="line-height:1.7;">' + links + '</div></div>';
  });
  const d = document.getElementById('detail');
  d.innerHTML = '<h2>' + node.id + '. ' + node.n + '</h2>' +
    '<div class="sub">' + authors.length + ' actores en este nodo</div>' +
    '<div class="row"><div class="label">Pregunta central</div><div class="val">' + node.q + '</div></div>' +
    '<div class="row"><div class="label">Tensiones internas</div><div class="val">' + node.t + '</div></div>' + groups;
  d.querySelectorAll('a[data-aname]').forEach(link => {
    link.onclick = (e) => {
      e.preventDefault();
      const a = AUTHORS.find(x => x.n === link.dataset.aname);
      if (a) { selectAuthor(a); if (state.view === 'grafo') drawGrafo(); }
    };
  });
}

let _novView = 'semana';

function novSwitch(v, btn) {
  _novView = v;

  if (btn) btn.classList.add('active');
  document.getElementById('novSemana').style.display = v === 'semana' ? '' : 'none';
  document.getElementById('novNodo').style.display   = v === 'nodo'   ? '' : 'none';
}

function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function alertHTML(it, extraMeta) {
  const meta = extraMeta || ('Nodo '+it.nodo+' · '+escH(it.fuente)+' · '+it.fecha);
  return '<div class="alert-item">'
    +'<div class="alert-meta">'+meta+'</div>'
    +'<div class="alert-title">'+escH(it.titulo)+'</div>'
    +'<div class="alert-summary">'+escH(it.p1)+'<br><br>'+escH(it.p2)+'</div>'
    +'<div style="margin-top:8px;font-size:11px;"><a href="'+it.url+'" target="_blank" rel="noopener">abrir fuente ↗</a></div>'
    +'</div>';
}

  // ── Por semana ──

    let h = '';
    const sorted = [...DIGESTOS].sort((a,b) => b.fecha.localeCompare(a.fecha));
    sorted.forEach(d => {
      h += '<div class="nov-section-header">Semana del '+escH(d.label)+' — '+d.items.length+' ítems</div>';
      d.items.forEach(it => {
        h += alertHTML(it);

    semana.innerHTML = h;
  }

  // ── Por nodo ──
  const nodoEl = document.getElementById('novNodo');
  if (nodoEl) {
    const allItems = [];
    DIGESTOS.forEach(d => d.items.forEach(it => allItems.push(Object.assign({}, it, {_sem: d.label}))));
    let h = '';
    NODES.forEach(node => {
      const nodeItems = allItems.filter(it => it.nodo === node.id || (it.ns||[]).includes(node.id));
      nodeItems.sort((a,b) => a.r - b.r);
      const shortName = node.n.split(':')[0].split(' vs.')[0].trim().substring(0,60);
      h += '<div class="nov-nodo-row">'
        +'<span class="nov-nodo-num">'+node.id+'</span>'
        +'<span class="nov-nodo-name">'+escH(shortName)+'</span>'
        +'</div>';
      if (nodeItems.length === 0) {
        h += '<div class="nov-empty">Sin novedades registradas en los digestos actuales.</div>';
      } else {
        nodeItems.forEach(it => {
          h += alertHTML(it, 'Semana '+escH(it._sem)+' · '+escH(it.fuente)+' · '+it.fecha);
        });
      }
    });
    nodoEl.innerHTML = h;
  }
}

</script>
</body>
</html>
